<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <title>PIXERA OS</title>
    <style>
      * {
        margin: 0;
        padding: 0;

    <script type="module" src="./js/kernel.js"></script>
